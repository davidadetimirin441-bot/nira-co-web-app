<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NIRA &amp; CO App</title>
  <link rel="icon" href="/assets/ratada-icon-192.png">
  <style>
    :root { --ink:#17211c; --muted:#5e6b64; --line:#d9dfd9; --green:#116447; --soft:#f5f7f2; }
    * { box-sizing: border-box; } body { margin:0; font-family: Inter, system-ui, Segoe UI, sans-serif; background:var(--soft); color:var(--ink); }
    button, input, select { font: inherit; } button { cursor:pointer; border:0; }
    .auth { position: fixed; inset: 0; z-index: 5; display:grid; place-items:center; padding:20px; background:linear-gradient(rgba(19,34,29,.78),rgba(19,34,29,.78)),url("https://images.unsplash.com/photo-1570129477492-45c003edd2be?auto=format&fit=crop&w=1600&q=80"); background-size:cover; }
    .auth[hidden] { display:none; } .panel { width:min(450px,100%); background:white; border-radius:8px; padding:24px; box-shadow:0 18px 42px rgba(23,33,28,.22); }
    .brand { display:flex; align-items:center; gap:10px; font-weight:900; } .brand img { width:36px; height:36px; border-radius:8px; }
    h1 { margin:18px 0 8px; font-size:26px; } p { color:var(--muted); line-height:1.45; }
    .tabs { display:grid; grid-template-columns:1fr 1fr; gap:8px; background:var(--soft); border:1px solid var(--line); border-radius:8px; padding:4px; margin:16px 0; }
    .tabs button { min-height:36px; border-radius:6px; background:transparent; color:var(--muted); font-weight:800; }
    .tabs button.active { background:white; color:var(--green); box-shadow:0 4px 12px rgba(23,33,28,.08); }
    form { display:grid; gap:10px; } form[hidden] { display:none; } input, select { width:100%; min-height:42px; border:1px solid var(--line); border-radius:7px; padding:0 12px; }
    .primary { min-height:42px; border-radius:7px; background:var(--green); color:white; font-weight:900; padding:0 14px; }
    .ghost { min-height:38px; border-radius:7px; border:1px solid var(--line); background:white; color:var(--ink); padding:0 12px; }
    .app { display:grid; grid-template-columns:250px 1fr; min-height:100vh; }
    aside { background:#13221d; color:white; padding:22px 18px; } aside nav { display:grid; gap:8px; margin-top:28px; } aside nav span { color:#c8d7ce; padding:10px 12px; border-radius:7px; }
    main { min-width:0; } .top { min-height:76px; display:flex; align-items:center; justify-content:space-between; gap:12px; padding:16px 28px; border-bottom:1px solid var(--line); background:rgba(245,247,242,.92); position:sticky; top:0; }
    .content { padding:22px 28px; display:grid; gap:18px; } .stats { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:14px; }
    .card, .deal, .tools { background:white; border:1px solid var(--line); border-radius:8px; padding:16px; box-shadow:0 8px 20px rgba(23,33,28,.05); }
    .card span, .deal p { color:var(--muted); font-size:13px; } .card strong { display:block; margin-top:8px; font-size:26px; }
    .workspace { display:grid; grid-template-columns:minmax(0,1fr) 340px; gap:18px; align-items:start; } .filters { display:grid; grid-template-columns:1fr 160px 160px; gap:10px; }
    .deals { display:grid; gap:12px; } .deal { display:grid; grid-template-columns:110px 1fr auto; gap:14px; align-items:center; }
    .thumb { height:84px; border-radius:7px; background-size:cover; background-position:center; }
    .pill { display:inline-flex; margin:3px 5px 0 0; padding:5px 8px; border-radius:999px; background:#dff1e7; color:var(--green); font-size:11px; font-weight:900; }
    .deal a { color:var(--green); font-weight:900; font-size:13px; } .profile h2 { margin-top:0; } .toast { position:fixed; right:18px; bottom:18px; background:#13221d; color:white; padding:12px 14px; border-radius:8px; opacity:0; transform:translateY(8px); transition:.2s; } .toast.show { opacity:1; transform:none; }
    @media (max-width:900px){ .app{grid-template-columns:1fr}.workspace,.stats{grid-template-columns:1fr} aside{position:static}.filters{grid-template-columns:1fr}.deal{grid-template-columns:90px 1fr}.price{grid-column:1/-1} }
  </style>
</head>
<body>
  <section class="auth" id="auth">
    <div class="panel">
      <div class="brand"><img src="/assets/ratada-logo.svg" alt=""> NIRA &amp; CO Global source</div>
      <h1 id="authTitle">Sign in</h1>
      <p>Use your account before entering the deal-sourcing workspace.</p>
      <div class="tabs"><button class="active" id="signinTab">Sign in</button><button id="signupTab">Sign up</button></div>
      <form id="signinForm"><input id="signinEmail" type="email" placeholder="Email" required><input id="signinPassword" type="password" placeholder="Password" required><button class="primary">Sign in</button></form>
      <form id="signupForm" hidden><input id="signupName" placeholder="Full name" required><input id="signupEmail" type="email" placeholder="Email" required><input id="signupPassword" type="password" minlength="6" placeholder="Create password" required><button class="primary">Create account</button></form>
    </div>
  </section>
  <div class="app">
    <aside><div class="brand"><img src="/assets/ratada-logo.svg" alt=""> NIRA &amp; CO</div><nav><span>Dashboard</span><span>Deals</span><span>Profiles</span><span>Pipeline</span></nav></aside>
    <main>
      <div class="top"><div><h1>Deal sourcing dashboard</h1><p id="brief">Loading workspace...</p></div><button class="ghost" id="signout">Sign out</button></div>
      <div class="content">
        <section class="stats"><div class="card"><span>Qualified deals</span><strong id="dealCount">0</strong></div><div class="card"><span>Average yield</span><strong id="avgYield">0%</strong></div><div class="card"><span>Average discount</span><strong id="avgDiscount">0%</strong></div><div class="card"><span>Markets watched</span><strong id="markets">0</strong></div></section>
        <section class="tools"><div class="filters"><input id="search" placeholder="Search location or strategy"><select id="region"><option>All</option></select><select id="strategy"><option>All</option></select></div></section>
        <section class="workspace"><div class="deals" id="deals"></div><div class="card profile" id="profile"></div></section>
      </div>
    </main>
  </div>
  <div class="toast" id="toast"></div>
  <script>
    let user = null, deals = [];
    const $ = (id) => document.getElementById(id);
    const money = new Intl.NumberFormat("en-GB", { style: "currency", currency: "GBP", maximumFractionDigits: 0 });
    function toast(message){ $("toast").textContent = message; $("toast").classList.add("show"); setTimeout(() => $("toast").classList.remove("show"), 1800); }
    function mode(which){ const up = which === "up"; $("signupForm").hidden = !up; $("signinForm").hidden = up; $("signupTab").classList.toggle("active", up); $("signinTab").classList.toggle("active", !up); $("authTitle").textContent = up ? "Sign up" : "Sign in"; }
    $("signinTab").onclick = () => mode("in"); $("signupTab").onclick = () => mode("up");
    async function api(path, body){ const res = await fetch(path, { method: body ? "POST" : "GET", headers: {"Content-Type":"application/json"}, body: body && JSON.stringify(body) }); const data = await res.json(); if(!res.ok) throw new Error(data.error || "Something went wrong"); return data; }
    $("signupForm").onsubmit = async (e) => { e.preventDefault(); try { const data = await api("/api/signup", { name: $("signupName").value, email: $("signupEmail").value, password: $("signupPassword").value }); user = data.user; $("auth").hidden = true; await loadDeals(); } catch(err){ toast(err.message); } };
    $("signinForm").onsubmit = async (e) => { e.preventDefault(); try { const data = await api("/api/signin", { email: $("signinEmail").value, password: $("signinPassword").value }); user = data.user; $("auth").hidden = true; await loadDeals(); } catch(err){ toast(err.message); } };
    $("signout").onclick = async () => { await api("/api/signout", {}); user = null; $("auth").hidden = false; };
    async function boot(){ const session = await api("/api/session"); user = session.user; $("auth").hidden = !!user; await loadDeals(); }
    async function loadDeals(){ const data = await api("/api/deals"); deals = data.deals; populateFilters(); render(); }
    function populateFilters(){ for (const [id, key] of [["region","region"],["strategy","strategy"]]) { const select = $(id); const value = select.value || "All"; select.innerHTML = "<option>All</option>" + [...new Set(deals.map(d => d[key]))].map(v => `<option>${v}</option>`).join(""); select.value = value; select.oninput = render; } $("search").oninput = render; }
    function filtered(){ const q = $("search").value.toLowerCase(); return deals.filter(d => (!q || `${d.title} ${d.location} ${d.strategy}`.toLowerCase().includes(q)) && ($("region").value === "All" || d.region === $("region").value) && ($("strategy").value === "All" || d.strategy === $("strategy").value)); }
    function render(){ const visible = filtered(); const avgY = visible.reduce((s,d)=>s+d.yield,0)/(visible.length || 1); const avgD = visible.reduce((s,d)=>s+d.discount,0)/(visible.length || 1); $("dealCount").textContent = visible.length; $("avgYield").textContent = avgY.toFixed(1)+"%"; $("avgDiscount").textContent = Math.round(avgD)+"%"; $("markets").textContent = user?.profile.markets || 0; $("brief").textContent = user ? `${user.name}'s workspace · ${user.profile.role}` : "Create or sign into an account to continue."; $("profile").innerHTML = user ? `<h2>${user.name}</h2><p>${user.email}</p><span class="pill">${user.profile.market}</span><span class="pill">${user.profile.closeRate}% close rate</span>${user.profile.tags.map(t=>`<span class="pill">${t}</span>`).join("")}` : "<h2>Sourcer profile</h2><p>Sign in to create your profile.</p>"; $("deals").innerHTML = visible.map(d => `<article class="deal"><div class="thumb" style="background-image:url('${d.image}')"></div><div><h2>${d.title}</h2><p>${d.location} · ${d.source} · ${d.strategy} · Owner: ${d.owner}</p><span class="pill">${d.yield}% yield</span><span class="pill">${d.discount}% discount</span><br><a href="${d.link}" target="_blank" rel="noopener">View listings</a></div><div class="price"><strong>${money.format(d.price)}</strong><p>guide price</p></div></article>`).join(""); }
    boot();
  </script>
</body>
</html>
