<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset Password | NIRA & CO</title>
  <link rel="icon" href="/assets/ratada-icon-192.png">
  <style>
    :root { --ink:#1d2430; --muted:#65707c; --line:#e1d8c9; --green:#0c7a63; --dark:#142333; --plum:#5b2c65; --gold:#f3c35b; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; padding:20px; font-family:Inter, system-ui, Segoe UI, sans-serif; color:var(--ink); background:linear-gradient(135deg, rgba(20,35,51,.86), rgba(91,44,101,.72), rgba(12,122,99,.68)),url("/assets/nira-co-building-logo.png"); background-size:cover; background-position:center; }
    .panel { width:min(460px,100%); background:white; border:1px solid var(--line); border-radius:8px; padding:24px; box-shadow:0 18px 42px rgba(23,33,28,.22); }
    .brand { display:flex; align-items:center; gap:10px; font-weight:900; margin-bottom:18px; }
    .brand img { width:38px; height:38px; border-radius:8px; object-fit:cover; }
    h1 { margin:0 0 8px; font-size:26px; }
    p { color:var(--muted); line-height:1.45; }
    form { display:grid; gap:10px; margin-top:16px; }
    input { width:100%; min-height:42px; border:1px solid var(--line); border-radius:7px; padding:0 12px; font:inherit; }
    button, a.button { min-height:42px; border:0; border-radius:7px; background:linear-gradient(135deg,var(--green),var(--plum)); color:white; font-weight:900; display:inline-flex; align-items:center; justify-content:center; text-decoration:none; padding:0 14px; cursor:pointer; }
    .show-password { display:flex; align-items:center; gap:8px; color:var(--muted); font-size:13px; }
    .show-password input { width:auto; min-height:auto; }
    .message { margin-top:12px; padding:10px 12px; border-radius:8px; background:#dff1e7; color:var(--green); font-weight:800; }
    .error { background:#f9ecd6; color:#bf7c1f; }
  </style>
</head>
<body>
  <main class="panel">
    <div class="brand"><img src="/assets/nira-co-building-logo.png" alt=""> NIRA &amp; CO</div>
    <h1>Reset your password</h1>
    <p>Create a new password for your NIRA & CO sourcing account.</p>
    <form id="resetForm">
      <input id="password" type="password" minlength="6" placeholder="New password" required>
      <label class="show-password"><input id="showPassword" type="checkbox"> Show password</label>
      <button>Update password</button>
    </form>
    <div id="message" class="message" hidden></div>
  </main>
  <script>
    const token = new URLSearchParams(location.search).get("token");
    const message = document.getElementById("message");
    let csrfToken = "";
    async function loadCsrf(){
      const response = await fetch("/api/csrf");
      const data = await response.json();
      csrfToken = data.csrfToken;
    }
    document.getElementById("showPassword").addEventListener("change", (event) => {
      document.getElementById("password").type = event.target.checked ? "text" : "password";
    });
    document.getElementById("resetForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      message.hidden = false;
      message.classList.remove("error");
      if (!token) {
        message.textContent = "Reset link is missing a token.";
        message.classList.add("error");
        return;
      }
      const response = await fetch("/api/password-reset/confirm", {
        method: "POST",
        headers: { "Content-Type": "application/json", "X-CSRF-Token": csrfToken },
        body: JSON.stringify({ token, password: document.getElementById("password").value, csrfToken })
      });
      const data = await response.json();
      if (!response.ok) {
        message.textContent = data.error || "Could not update password.";
        message.classList.add("error");
        return;
      }
      message.innerHTML = 'Password updated. <a href="/app">Open the app</a>';
      setTimeout(() => location.href = "/app", 1200);
    });
    loadCsrf();
  </script>
</body>
</html>
